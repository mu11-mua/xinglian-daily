<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>星链AI速报 · 7月17日</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a0a10;
  color: #fff;
  padding: 24px 16px 60px;
}
.cards{
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 420px;
  margin: 0 auto;
}
.card{
  border-radius: 24px;
  padding: 30px 24px 24px;
  position: relative;
  overflow: hidden;
}
.card-tag{
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  text-transform: uppercase;
  background: rgba(255,255,255,.2);
  backdrop-filter: blur(4px);
}
.card-title{
  font-size: 22px;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}
.card-body{
  font-size: 14px;
  line-height: 1.9;
  opacity: .9;
}
.card-body b{font-weight:700}
.card-links{margin-top:16px;display:flex;flex-direction:column;gap:5px}
.card-links a{color:#fff;opacity:.8;font-size:13px;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.2);display:inline-block;padding-bottom:2px}
.card-links .no-link{opacity:.5;font-size:13px}
.meta{font-size:12px;opacity:.6;margin-top:10px}
.strike{text-decoration:line-through;opacity:.5;margin-right:6px}

.c0{background:linear-gradient(135deg,#ff512f,#dd2476)}
.c1{background:linear-gradient(135deg,#11998e,#38ef7d)}
.c2{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.c3{background:linear-gradient(135deg,#8e2de2,#4a00e0)}
.c4{background:linear-gradient(135deg,#f7971e,#ffd200)}
.c5{background:linear-gradient(135deg,#fc466b,#3f5efb)}

.footer{text-align:center;margin-top:28px;padding:16px 0}
.footer-brand{font-size:14px;font-weight:600;color:#666;letter-spacing:2px;margin-bottom:10px}
.footer-cta{font-size:16px;font-weight:700;color:#ff512f;line-height:1.6}
</style>
</head>
<body>
<div class="cards">

</div>
<div class="footer">
  <div class="footer-brand">星链 AI · 每日速报</div>
  <div class="footer-cta">想让我去你公司看看哪里能用AI？<br>厦门预约，私信「诊断」</div>
</div>
</body>
</html>
